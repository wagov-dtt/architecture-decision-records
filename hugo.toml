baseURL = "https://adr.dtt.digital.wa.gov.au/"
locale = "en-AU"
title = "WA Government Architecture Decision Records"
contentDir = "content"
enableEmoji = true
enableGitInfo = true
timeZone = "Australia/Perth"

[module]
  [module.hugoVersion]
    extended = true
    min = "0.140.0"

  [[module.imports]]
    path = "github.com/colinwilson/lotusdocs"
    disable = false

  [[module.imports]]
    path = "github.com/gohugoio/hugo-mod-bootstrap-scss/v5"
    disable = false

[markup]
  defaultMarkdownHandler = "goldmark"

  [markup.goldmark.renderer]
    unsafe = true

  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3

[params]
  description = "Reusable architecture patterns for WA Government digital services."
  customCSS = ["css/printable.css"]

[params.docs]
  title = "Architecture Decision Records"
  pathName = "docs"
  themeColor = "blue"
  darkMode = true
  prism = true
  sidebarIcons = true
  titleIcon = true
  breadcrumbs = true
  toc = true
  backToTop = true
  lastMod = true
  repoURL = "https://github.com/wagov-dtt/architecture-decision-records"
  repoBranch = "main"
  editPage = true

[params.flexsearch]
  enabled = true

[[menu.primary]]
  name = "Docs"
  url = "/docs/"
  identifier = "docs"
  weight = 10

[[menu.primary]]
  name = "Printable"
  url = "/printable/"
  identifier = "printable"
  weight = 20
